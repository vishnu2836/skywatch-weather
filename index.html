<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyWatch — Weather App</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    #cloud-canvas, #bird-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .cloud { position: absolute; opacity: 0; will-change: transform; }
    .cloud svg { display: block; }
    @keyframes cloudDrift {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(110vw); }
    }
    .bird-flock { position: absolute; animation: birdDrift linear infinite; will-change: transform; }
    @keyframes birdDrift {
      0%   { transform: translateX(-20vw); }
      100% { transform: translateX(115vw); }
    }
    .bird-wing-top { animation: flapTop ease-in-out infinite alternate; transform-origin: right center; }
    .bird-wing-bot { animation: flapBot ease-in-out infinite alternate; transform-origin: right center; }
    @keyframes flapTop { from { transform: rotate(-28deg); } to { transform: rotate(10deg); } }
    @keyframes flapBot { from { transform: rotate(28deg); } to { transform: rotate(-10deg); } }
  </style>
</head>
<body>

  <div id="cloud-canvas"></div>
  <div id="bird-canvas"></div>

  <div class="bg-wrap">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <main class="container">

    <header class="header">
      <div class="header-left">
        <h1 class="logo">SKY<span>WATCH</span></h1>
        <p class="tagline">Real-time weather intelligence</p>
      </div>
      <div class="header-date" id="headerDate"></div>
    </header>

    <div class="search-box">
      <div class="input-wrapper">
        <svg class="search-icon-left" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="cityInput" placeholder="Search for a city..." autocomplete="off"/>
        <button class="clear-input-btn" id="clearInputBtn" onclick="clearInput()">✕</button>
      </div>
      <button id="searchBtn" onclick="searchWeather()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>

    <div id="errorMsg" class="error-msg hidden"></div>

    <div id="weatherCard" class="weather-card hidden">
      <div class="weather-location">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span id="countryName">—</span>
      </div>

      <!-- Google Weather style info bar -->
      <div class="gw-bar">
        <div class="gw-left">
          <div class="gw-row"><span class="gw-label">Precipitation</span><span id="gwPrecip" class="gw-val">—</span></div>
          <div class="gw-row"><span class="gw-label">Humidity</span><span id="gwHumidity" class="gw-val">—</span></div>
          <div class="gw-row"><span class="gw-label">Wind</span><span id="gwWind" class="gw-val">—</span></div>
        </div>
        <div class="gw-right">
          <div class="gw-title">Weather</div>
          <div id="gwDay" class="gw-day">—</div>
          <div id="gwCondition" class="gw-condition">—</div>
        </div>
      </div>

      <div class="weather-main-row">
        <div class="temp-block">
          <div class="temp-row">
            <span id="temperature" class="big-temp">—</span>
            <span class="unit">°C</span>
          </div>
          <p id="description" class="desc-text">—</p>
          <p id="cityName" class="city-day-info">—</p>
        </div>
        <img id="weatherIcon" src="" alt="weather icon" class="weather-icon"/>
      </div>

      <div class="stats-grid">
        <div class="stat-pill">
          <span class="stat-emoji">🌡️</span>
          <div><div class="stat-label">Feels Like</div><div id="feelsLike" class="stat-value">—</div></div>
        </div>
        <div class="stat-pill">
          <span class="stat-emoji">💧</span>
          <div><div class="stat-label">Humidity</div><div id="humidity" class="stat-value">—</div></div>
        </div>
        <div class="stat-pill">
          <span class="stat-emoji">💨</span>
          <div><div class="stat-label">Wind</div><div id="wind" class="stat-value">—</div></div>
        </div>
        <div class="stat-pill">
          <span class="stat-emoji">🔵</span>
          <div><div class="stat-label">Pressure</div><div id="pressure" class="stat-value">—</div></div>
        </div>
      </div>
    </div>

    <div id="hourlySection" class="hourly-section hidden">
      <div class="section-title">Today's Temperature — Hourly</div>
      <div class="temp-legend">
        <span class="legend-dot" style="background:#8ab4f8"></span> Cool
        <span class="legend-dot" style="background:#fdd663; margin-left:12px"></span> Warm
        <span class="legend-dot" style="background:#f28b82; margin-left:12px"></span> Hot
      </div>
      <div class="hourly-scroll">
        <div id="hourlyTrack" class="hourly-track"></div>
      </div>
    </div>

    <div id="forecastSection" class="forecast-section hidden">
      <h3 class="section-title">5-Day Forecast</h3>
      <div id="forecastCards" class="forecast-grid"></div>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h3 class="section-title">Recent Searches</h3>
        <button class="clear-btn" onclick="clearHistory()">Clear All</button>
      </div>
      <div id="historyList" class="history-list">
        <p class="no-history">No searches yet...</p>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
  <script>
    document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    // CLOUDS
    (function () {
      const canvas = document.getElementById('cloud-canvas');
      const cloudShapes = [
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100" width="260" height="100"><ellipse cx="130" cy="72" rx="120" ry="28" fill="currentColor"/><ellipse cx="80" cy="58" rx="55" ry="40" fill="currentColor"/><ellipse cx="150" cy="50" rx="65" ry="48" fill="currentColor"/><ellipse cx="210" cy="62" rx="45" ry="32" fill="currentColor"/><ellipse cx="40" cy="68" rx="38" ry="24" fill="currentColor"/></svg>`,
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80"><ellipse cx="100" cy="58" rx="90" ry="22" fill="currentColor"/><ellipse cx="65" cy="45" rx="44" ry="35" fill="currentColor"/><ellipse cx="130" cy="40" rx="52" ry="38" fill="currentColor"/><ellipse cx="170" cy="52" rx="34" ry="24" fill="currentColor"/></svg>`,
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 70" width="160" height="70"><ellipse cx="80" cy="52" rx="72" ry="18" fill="currentColor"/><ellipse cx="55" cy="40" rx="38" ry="30" fill="currentColor"/><ellipse cx="105" cy="36" rx="44" ry="34" fill="currentColor"/><ellipse cx="140" cy="48" rx="26" ry="18" fill="currentColor"/></svg>`,
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60"><ellipse cx="150" cy="45" rx="140" ry="14" fill="currentColor"/><ellipse cx="90" cy="35" rx="60" ry="26" fill="currentColor"/><ellipse cx="200" cy="32" rx="70" ry="28" fill="currentColor"/><ellipse cx="260" cy="40" rx="42" ry="18" fill="currentColor"/><ellipse cx="40" cy="42" rx="36" ry="16" fill="currentColor"/></svg>`,
      ];
      const cloudConfigs = [
        [0,4,1.30,90,-10,0.07,0],[2,10,0.80,75,-30,0.06,1],[1,18,1.10,110,-55,0.07,0],
        [3,6,0.90,130,-20,0.05,2],[0,25,0.70,80,-65,0.05,1],[2,32,1.20,100,-40,0.07,0],
        [1,14,0.60,70,-10,0.05,2],[3,38,1.00,120,-80,0.06,0],[0,48,0.85,95,-25,0.05,1],
        [2,55,1.15,85,-50,0.07,0],[1,42,0.65,115,-70,0.05,2],[3,60,0.90,75,-15,0.06,1],
      ];
      cloudConfigs.forEach(([si,topPct,scale,dur,delay,opMax,blur]) => {
        const div = document.createElement('div');
        div.className = 'cloud';
        div.innerHTML = cloudShapes[si];
        div.style.cssText = `top:${topPct}%;left:0;color:rgba(180,210,255,1);transform:scale(${scale});transform-origin:top left;filter:blur(${blur}px);animation:cloudDrift ${dur}s linear ${delay}s infinite;opacity:0;`;
        canvas.appendChild(div);
        div.animate(
          [{opacity:0,offset:0},{opacity:opMax,offset:0.05},{opacity:opMax,offset:0.92},{opacity:0,offset:1}],
          {duration:dur*1000,delay:delay*1000,iterations:Infinity,easing:'linear',fill:'forwards'}
        );
      });
    })();

    // BIRDS
    (function () {
      const canvas = document.getElementById('bird-canvas');
      function makeBird(size, color, flapDur) {
        const wt = 10 - size*0.7, wb = 10 + size*0.3;
        return `<svg xmlns="http://www.w3.org/2000/svg" width="${size*2}" height="${size}" viewBox="0 0 40 20" overflow="visible"><ellipse cx="20" cy="10" rx="2" ry="1.2" fill="${color}"/><path class="bird-wing-top" d="M20 10 Q10 ${wt} 2 12" stroke="${color}" stroke-width="1.6" fill="none" stroke-linecap="round" style="animation-duration:${flapDur}ms"/><path class="bird-wing-bot" d="M20 10 Q10 ${wb} 2 12" stroke="${color}" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.45" style="animation-duration:${flapDur}ms"/><path class="bird-wing-top" d="M20 10 Q30 ${wt} 38 12" stroke="${color}" stroke-width="1.6" fill="none" stroke-linecap="round" style="animation-duration:${flapDur}ms;transform-origin:left center;"/><path class="bird-wing-bot" d="M20 10 Q30 ${wb} 38 12" stroke="${color}" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.45" style="animation-duration:${flapDur}ms;transform-origin:left center;"/></svg>`;
      }
      const flocks = [
        [5,8,55,-10,0.90,0.55,900,'rgba(180,220,255,0.9)'],[3,16,80,-35,0.65,0.40,1100,'rgba(160,210,255,0.8)'],
        [7,24,45,-20,1.10,0.60,750,'rgba(200,230,255,0.9)'],[4,35,70,-50,0.75,0.35,1000,'rgba(140,200,255,0.7)'],
        [2,12,95,-60,0.50,0.30,1300,'rgba(160,215,255,0.6)'],[6,42,60,-15,0.85,0.50,850,'rgba(190,225,255,0.85)'],
        [3,52,50,-40,1.00,0.45,920,'rgba(175,220,255,0.75)'],
      ];
      flocks.forEach(([count,topPct,dur,delay,scale,opacity,flapMs,color]) => {
        const flock = document.createElement('div');
        flock.className = 'bird-flock';
        flock.style.cssText = `top:${topPct}%;left:0;display:flex;gap:${6+Math.random()*10}px;align-items:flex-end;opacity:${opacity};transform:scale(${scale});transform-origin:top left;animation-duration:${dur}s;animation-delay:${delay}s;`;
        for (let i = 0; i < count; i++) {
          const w = document.createElement('div');
          w.style.cssText = `display:inline-block;margin-top:${(Math.random()-0.5)*20}px;margin-left:${Math.random()*12}px;transform:scale(${0.7+Math.random()*0.6});`;
          w.innerHTML = makeBird(10, color, Math.round(flapMs+(Math.random()-0.5)*200));
          flock.appendChild(w);
        }
        canvas.appendChild(flock);
      });
    })();
  </script>
</body>
</html>
